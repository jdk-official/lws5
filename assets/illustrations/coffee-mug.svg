<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Coffee mug">
  <defs>
    <linearGradient id="mug-body" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ecdea8"/>
      <stop offset="0.5" stop-color="#d0b868"/>
      <stop offset="1" stop-color="#8c6a30"/>
    </linearGradient>
    <linearGradient id="mug-rim" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#a87020"/>
      <stop offset="1" stop-color="#5a3010"/>
    </linearGradient>
    <radialGradient id="liquid" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0" stop-color="#6e3812"/>
      <stop offset="0.7" stop-color="#3a1c08"/>
      <stop offset="1" stop-color="#1a0e04"/>
    </radialGradient>
    <radialGradient id="steam" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#f5e6c8" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#d0b868" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Saucer shadow -->
  <ellipse cx="100" cy="205" rx="80" ry="6" fill="#000" opacity="0.45"/>

  <!-- STEAM SWIRLS -->
  <g opacity="0.7">
    <path d="M 75 50 Q 70 35, 80 22 T 75 0" fill="none" stroke="#f5e6c8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M 100 45 Q 105 28, 95 15 T 102 -3" fill="none" stroke="#f5e6c8" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M 125 50 Q 130 35, 120 22 T 125 0" fill="none" stroke="#f5e6c8" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <ellipse cx="100" cy="35" rx="40" ry="18" fill="url(#steam)"/>
  </g>

  <!-- HANDLE (back, draw before body) -->
  <path d="M 160 100
           C 195 100, 195 145, 160 145
           L 160 135
           C 180 135, 180 110, 160 110 Z"
        fill="url(#mug-rim)" stroke="#1c0e04" stroke-width="2"/>

  <!-- MUG BODY -->
  <path d="M 40 90
           Q 40 80, 50 80
           L 150 80
           Q 160 80, 160 90
           L 152 190
           Q 152 200, 142 200
           L 58 200
           Q 48 200, 48 190 Z"
        fill="url(#mug-body)" stroke="#1c0e04" stroke-width="2.5"/>

  <!-- Mug highlight stripe -->
  <path d="M 56 90 L 60 195" stroke="#fff5d0" stroke-width="3" opacity="0.35" stroke-linecap="round"/>

  <!-- RIM (top opening) -->
  <ellipse cx="100" cy="82" rx="60" ry="10" fill="url(#mug-rim)" stroke="#1c0e04" stroke-width="2"/>

  <!-- LIQUID SURFACE -->
  <ellipse cx="100" cy="82" rx="55" ry="8" fill="url(#liquid)" stroke="#1c0e04" stroke-width="1.5"/>
  <ellipse cx="100" cy="80" rx="48" ry="5" fill="#0a0402" opacity="0.5"/>

  <!-- Decorative band on mug -->
  <rect x="50" y="140" width="100" height="14" fill="#5a3010" opacity="0.5"/>
  <line x1="50" y1="140" x2="148" y2="140" stroke="#d4900a" stroke-width="1.5"/>
  <line x1="50" y1="154" x2="148" y2="154" stroke="#d4900a" stroke-width="1.5"/>
  <!-- Small star motif on band -->
  <g fill="#d4900a">
    <path d="M 80 147 l 1.2 2.5 l 2.8 0.3 l -2 1.8 l 0.5 2.7 l -2.5 -1.4 l -2.5 1.4 l 0.5 -2.7 l -2 -1.8 l 2.8 -0.3 z"/>
    <path d="M 100 147 l 1.2 2.5 l 2.8 0.3 l -2 1.8 l 0.5 2.7 l -2.5 -1.4 l -2.5 1.4 l 0.5 -2.7 l -2 -1.8 l 2.8 -0.3 z"/>
    <path d="M 120 147 l 1.2 2.5 l 2.8 0.3 l -2 1.8 l 0.5 2.7 l -2.5 -1.4 l -2.5 1.4 l 0.5 -2.7 l -2 -1.8 l 2.8 -0.3 z"/>
  </g>
</svg>
