<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" role="img" aria-label="Western bank">
  <defs>
    <linearGradient id="stone" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c89050"/>
      <stop offset="0.5" stop-color="#a06830"/>
      <stop offset="1" stop-color="#5a3010"/>
    </linearGradient>
    <linearGradient id="column" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#7a4818"/>
      <stop offset="0.5" stop-color="#d4a060"/>
      <stop offset="1" stop-color="#5a3010"/>
    </linearGradient>
    <linearGradient id="door-bank" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3a1c08"/>
      <stop offset="1" stop-color="#1c0e04"/>
    </linearGradient>
    <linearGradient id="signbg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5a3010"/>
      <stop offset="1" stop-color="#3a1c08"/>
    </linearGradient>
    <linearGradient id="brass-b" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f0c030"/>
      <stop offset="1" stop-color="#a87020"/>
    </linearGradient>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="200" cy="305" rx="180" ry="8" fill="#000" opacity="0.5"/>

  <!-- BACK WALL -->
  <rect x="40" y="80" width="320" height="220" fill="url(#stone)" stroke="#1c0e04" stroke-width="2"/>

  <!-- Stone block pattern -->
  <g stroke="#5a3010" stroke-width="0.8" opacity="0.6" fill="none">
    <line x1="40" y1="120" x2="360" y2="120"/>
    <line x1="40" y1="160" x2="360" y2="160"/>
    <line x1="40" y1="200" x2="360" y2="200"/>
    <line x1="40" y1="240" x2="360" y2="240"/>
    <!-- vertical breaks staggered -->
    <line x1="100" y1="80" x2="100" y2="120"/>
    <line x1="170" y1="80" x2="170" y2="120"/>
    <line x1="230" y1="80" x2="230" y2="120"/>
    <line x1="300" y1="80" x2="300" y2="120"/>
    <line x1="70" y1="120" x2="70" y2="160"/>
    <line x1="140" y1="120" x2="140" y2="160"/>
    <line x1="200" y1="120" x2="200" y2="160"/>
    <line x1="265" y1="120" x2="265" y2="160"/>
    <line x1="330" y1="120" x2="330" y2="160"/>
  </g>

  <!-- ROOF -->
  <polygon points="20,90 200,30 380,90 360,100 200,46 40,100" fill="#5a3010" stroke="#1c0e04" stroke-width="2"/>
  <polygon points="40,100 200,46 360,100 360,108 40,108" fill="#3a1c08"/>

  <!-- PEDIMENT (triangular over entrance) -->
  <polygon points="120,90 200,55 280,90 280,100 200,68 120,100" fill="#7a4818" stroke="#1c0e04" stroke-width="1.5"/>

  <!-- SIGN (main "BANK" sign on top frieze) -->
  <rect x="80" y="105" width="240" height="32" fill="url(#signbg)" stroke="#1c0e04" stroke-width="2"/>
  <rect x="86" y="111" width="228" height="20" fill="none" stroke="url(#brass-b)" stroke-width="1.5"/>
  <text x="200" y="129" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#f0c030" letter-spacing="6">BANK</text>

  <!-- TWO COLUMNS -->
  <g>
    <!-- Left column -->
    <rect x="78" y="150" width="22" height="110" fill="url(#column)" stroke="#1c0e04" stroke-width="1.5"/>
    <!-- Capital -->
    <rect x="73" y="142" width="32" height="10" fill="#d4a060" stroke="#1c0e04" stroke-width="1.5"/>
    <!-- Base -->
    <rect x="73" y="258" width="32" height="10" fill="#d4a060" stroke="#1c0e04" stroke-width="1.5"/>
    <!-- Fluting lines -->
    <g stroke="#3a1c08" stroke-width="0.5" opacity="0.5">
      <line x1="84" y1="152" x2="84" y2="258"/>
      <line x1="89" y1="152" x2="89" y2="258"/>
      <line x1="94" y1="152" x2="94" y2="258"/>
    </g>
  </g>
  <g>
    <!-- Right column -->
    <rect x="300" y="150" width="22" height="110" fill="url(#column)" stroke="#1c0e04" stroke-width="1.5"/>
    <rect x="295" y="142" width="32" height="10" fill="#d4a060" stroke="#1c0e04" stroke-width="1.5"/>
    <rect x="295" y="258" width="32" height="10" fill="#d4a060" stroke="#1c0e04" stroke-width="1.5"/>
    <g stroke="#3a1c08" stroke-width="0.5" opacity="0.5">
      <line x1="306" y1="152" x2="306" y2="258"/>
      <line x1="311" y1="152" x2="311" y2="258"/>
      <line x1="316" y1="152" x2="316" y2="258"/>
    </g>
  </g>

  <!-- LEFT WINDOWS with bars -->
  <g>
    <rect x="120" y="160" width="40" height="60" fill="#3a1c08" stroke="#1c0e04" stroke-width="1.5"/>
    <rect x="123" y="163" width="34" height="54" fill="#f0c030" opacity="0.7"/>
    <g stroke="#1c0e04" stroke-width="1.2">
      <line x1="130" y1="160" x2="130" y2="220"/>
      <line x1="140" y1="160" x2="140" y2="220"/>
      <line x1="150" y1="160" x2="150" y2="220"/>
      <line x1="120" y1="190" x2="160" y2="190"/>
    </g>
  </g>
  <g>
    <rect x="240" y="160" width="40" height="60" fill="#3a1c08" stroke="#1c0e04" stroke-width="1.5"/>
    <rect x="243" y="163" width="34" height="54" fill="#f0c030" opacity="0.7"/>
    <g stroke="#1c0e04" stroke-width="1.2">
      <line x1="250" y1="160" x2="250" y2="220"/>
      <line x1="260" y1="160" x2="260" y2="220"/>
      <line x1="270" y1="160" x2="270" y2="220"/>
      <line x1="240" y1="190" x2="280" y2="190"/>
    </g>
  </g>

  <!-- CENTRAL DOOR -->
  <path d="M 170 270 L 170 175 Q 170 155, 200 155 Q 230 155, 230 175 L 230 270 Z"
        fill="url(#door-bank)" stroke="#1c0e04" stroke-width="2.5"/>
  <!-- Door panel inset -->
  <path d="M 180 263 L 180 180 Q 180 167, 200 167 Q 220 167, 220 180 L 220 263 Z"
        fill="none" stroke="#5a3010" stroke-width="1.2"/>
  <!-- Door split (double door) -->
  <line x1="200" y1="155" x2="200" y2="270" stroke="#1c0e04" stroke-width="1"/>
  <!-- Door handles -->
  <circle cx="195" cy="215" r="2.5" fill="url(#brass-b)"/>
  <circle cx="205" cy="215" r="2.5" fill="url(#brass-b)"/>

  <!-- ENTRANCE STEPS -->
  <rect x="155" y="270" width="90" height="8" fill="#7a4818" stroke="#1c0e04" stroke-width="1.2"/>
  <rect x="150" y="278" width="100" height="8" fill="#5a3010" stroke="#1c0e04" stroke-width="1.2"/>
  <rect x="145" y="286" width="110" height="8" fill="#3a1c08" stroke="#1c0e04" stroke-width="1.2"/>

  <!-- DOLLAR SYMBOL above door -->
  <circle cx="200" cy="80" r="14" fill="url(#brass-b)" stroke="#1c0e04" stroke-width="2"/>
  <text x="200" y="87" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="bold" fill="#1c0e04">$</text>

  <!-- GROUND -->
  <rect x="20" y="290" width="360" height="20" fill="#2a1a08" opacity="0.7"/>
</svg>
