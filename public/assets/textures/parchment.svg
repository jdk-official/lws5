<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <filter id="p">
      <feTurbulence type="fractalNoise" baseFrequency="0.65 0.75" numOctaves="4" seed="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.15  0 0 0 0 0.07  0 0 0 0 0  0.4 0.3 0.1 0 -0.05" in="n"/>
    </filter>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0" stop-color="#ecdea8"/>
      <stop offset="0.7" stop-color="#e0cc8a"/>
      <stop offset="1" stop-color="#b89854"/>
    </radialGradient>
    <radialGradient id="stain1" cx="0.2" cy="0.3" r="0.15">
      <stop offset="0" stop-color="rgba(120,70,20,0.18)"/>
      <stop offset="1" stop-color="rgba(120,70,20,0)"/>
    </radialGradient>
    <radialGradient id="stain2" cx="0.85" cy="0.75" r="0.18">
      <stop offset="0" stop-color="rgba(80,40,10,0.15)"/>
      <stop offset="1" stop-color="rgba(80,40,10,0)"/>
    </radialGradient>
    <radialGradient id="stain3" cx="0.6" cy="0.15" r="0.12">
      <stop offset="0" stop-color="rgba(100,55,15,0.13)"/>
      <stop offset="1" stop-color="rgba(100,55,15,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#vignette)"/>
  <rect width="600" height="600" fill="url(#stain1)"/>
  <rect width="600" height="600" fill="url(#stain2)"/>
  <rect width="600" height="600" fill="url(#stain3)"/>
  <rect width="600" height="600" filter="url(#p)"/>
</svg>
